<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@900&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: transparent; }
  .lockup {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 24px;
  }
  .lockup img { width: 220px; height: 220px; display: block; }
  .text { display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
  .ja {
    font-family: 'Zen Old Mincho', serif;
    font-weight: 900;
    font-size: 44px;
    letter-spacing: 0.08em;
    color: #12343b;
  }
  .en {
    margin-top: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.42em;
    color: #0f7b8a;
  }
</style>
</head>
<body>
  <div class="lockup" id="target">
    <img src="mark.svg" alt="">
    <span class="text">
      <span class="ja">シビックテック唐津</span>
      <span class="en">CIVIC TECH KARATSU</span>
    </span>
  </div>
</body>
</html>
